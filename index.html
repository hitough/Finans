        const formatCurrency = (amount, decimals = 2, language = 'tr') => {
            return new Intl.NumberFormat(language === 'tr' ? 'tr-TR' : 'en-US', {
                style: 'currency',
                currency: 'TRY',
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals

        // PieChart Component
        function PieChart({ title, dataMap, colors, totalLabel = "Toplam", language = 'tr' }) {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);
            const dataHash = JSON.stringify(dataMap);

            useEffect(() => {
                if (!canvasRef.current) return;

                const labels = Object.keys(dataMap);
                const data = Object.values(dataMap);

                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }

                if (data.length === 0) return;

                chartInstance.current = new window.Chart(canvasRef.current, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: colors,
                            borderWidth: 0,
                            hoverOffset: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '70%',
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    padding: 20,
                                    usePointStyle: true,
                                    pointStyle: 'circle',
                                    color: '#414755',
                                    font: { family: 'Inter', size: 12, weight: '500' }
                                }
                            }
                        }
                    }
                });

                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                        chartInstance.current = null;
                    }
                };
            }, [dataHash, colors]);

            if (Object.keys(dataMap).length === 0) return null;

            const total = Object.values(dataMap).reduce((a, b) => a + b, 0);

            return (
                <div className="bg-surface-container-lowest p-6 rounded-2xl shadow-[0_8px_24px_rgba(26,27,31,0.04)] mb-4">
                    <h3 className="font-bold tracking-tight text-on-surface mb-2">{title}</h3>
                    <div className="h-64 w-full flex items-center justify-center">
                        <canvas ref={canvasRef}></canvas>
                    </div>
                    <div className="flex flex-col items-center justify-center mt-4 border-t border-surface-container-high pt-4">
                        <span className="text-[10px] font-bold text-on-surface-variant uppercase opacity-60">{totalLabel}</span>
                        <span className="text-xl font-black text-on-surface">{formatCurrency(total, 0, language)}</span>
                    </div>
                </div>
            );
        }

        function CategoryCharts({ transactions, t, language }) {
            const giderKat = {};

            const now = new Date();
            transactions.forEach(t => {
                if (t.tekrarli) {
                    const txDate = new Date(t.tarih);
                    if (txDate.getMonth() !== now.getMonth() || txDate.getFullYear() !== now.getFullYear()) {
                        return;
                    }
                }
                const m = parseFloat(t.miktar) || 0;
                const kat = t.kategori || "Diğer";
                if (t.tip === 'gider') giderKat[kat] = (giderKat[kat] || 0) + m;
            });

            if (Object.keys(giderKat).length === 0) return null;

            return (
                <section className="space-y-4 pt-2">
                    <h2 className="font-['Inter'] text-[11px] font-bold tracking-widest text-on-surface-variant uppercase pl-1">{t('kategori_analizi')}</h2>
                    <PieChart title={t('harcama_dagilimi')} dataMap={giderKat} colors={GIDER_COLORS} totalLabel={t('toplam')} language={language} />
                </section>
            );
        }

                            'apikey': SUPABASE_ANON_KEY

                        body: JSON.stringify({ summaryData })

                        console.error("Fonksiyon Hatası:", result);
                        setInsight(`Hata: ${result.error || 'Bilinmeyen bir hata oluştu.'}`);
                    } else if (result.insight) {
                        setInsight(result.insight);

                        throw new Error("Beklenmedik yanıt formatı.");

                        try {
                            const typedarray = new Uint8Array(e.target.result);
                            const pdf = await pdfjsLib.getDocument(typedarray).promise;
                            let fullText = "";
                            for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
                                const page = await pdf.getPage(i);
                                const textContent = await page.getTextContent();
                                fullText += textContent.items.map(item => item.str).join(" ");
                            }

                            const summaryData = {
                                mode: 'statement',
                                statementText: fullText.substring(0, 5000)
                            };

                            const response = await fetch(`${SUPABASE_URL}/functions/v1/ai-insights`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                    'apikey': SUPABASE_ANON_KEY
                                },
                                body: JSON.stringify({ summaryData })
                            });

                            const result = await response.json();
                            if (result.insight) setStatementAnalysis(result.insight);
                            else if (result.error) throw new Error(result.error);
                            else throw new Error("Analiz başarısız.");
                        } catch (err) {
                            setStatementAnalysis("Hata: " + err.message);
                        } finally {
                            setStatementLoading(false);
                        }

                    reader.readAsArrayBuffer(file);

                    setStatementAnalysis("Hata: " + err.message);
                    setStatementLoading(false);

                        const isFutureMonth = txDate.getFullYear() > now.getFullYear() ||
                            (txDate.getFullYear() === now.getFullYear() && txDate.getMonth() > now.getMonth());
                        if (isFutureMonth) {
                            return acc;
                        }

                    const miktar = parseFloat(curr.miktar) || 0;

            const checkAndNotifyUpcoming = (data) => {
                if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;

                const now = new Date();
                const tomorrow = new Date(now.getTime() + (24 * 60 * 60 * 1000));

                const todayKey = `notified_${now.toISOString().split('T')[0]}`;
                let notifiedIds = [];
                try {
                    notifiedIds = JSON.parse(localStorage.getItem(todayKey) || "[]");
                } catch (e) { notifiedIds = []; }

                let newlyNotified = false;

                data.forEach(t => {
                    const txDate = new Date(t.tarih);
                    // Proactive check: in the future, within 24 hours, and not already notified today
                    if (txDate > now && txDate <= tomorrow) {
                        if (!notifiedIds.includes(t.id)) {
                            new Notification("Yaklaşan İşlem Hatırlatıcısı", {
                                body: `${t.aciklama} - ${formatCurrency(t.miktar)} tutarındaki işleminiz yaklaşıyor.`,
                                tag: t.id // Prevents multiple notifications for same tx if app reloads
                            });
                            notifiedIds.push(t.id);
                            newlyNotified = true;

                    }

                                                                <Icon name="check-circle-2" className="w-4 h-4" />
                                                            </button>
                                                            <button onClick={() => openEditModal(item)} className="p-2 text-on-surface-variant hover:text-primary transition-colors bg-surface-container-low rounded-lg active:scale-95" title={t('duzenle')}>
                                                                <Icon name="pencil" className="w-4 h-4" />
                                                            </button>
                                                            <button onClick={(e) => { e.stopPropagation(); handleDeleteTx(item.id); }} className="p-2 text-on-surface-variant hover:text-error transition-colors bg-surface-container-low rounded-lg active:scale-95" title={t('sil')}>
                                                                <Icon name="trash-2" className="w-4 h-4" />
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ));
                                        })()
                                    )}
                                    {!showAllPast && pastTransactions.length > 3 && (
                                        <button onClick={() => setShowAllPast(true)} className="w-full relative bg-surface-container-lowest py-3 text-sm font-bold text-primary transition-colors hover:bg-surface-container-high active:scale-[0.99]">
                                            {t('tumunu_gor')} ({pastTransactions.length})
                                        </button>
                                    )}
                                </div>
                            </section>

                            {/* Charts Section */}
                            <CategoryCharts transactions={transactions} t={t} language={language} />
                        </div>

                        {/* BottomNavBar */}
                        <nav className="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pt-3 pb-8 bg-[#faf9fe]/80 backdrop-blur-2xl z-50 rounded-t-3xl shadow-[0_-8px_24px_rgba(26,27,31,0.04)]">
                            <a className="flex flex-col items-center justify-center text-primary scale-110 transition-transform tap-highlight-none active:scale-90 duration-300" href="#">
                                <Icon name="wallet" className="w-6 h-6" />
                                <span className="font-['Inter'] text-[11px] font-medium tracking-wide uppercase mt-1">{t('genel')}</span>
                            </a>
                            <button
                                onClick={() => setShowQuickAdd(true)}
                                className="flex flex-col items-center justify-center text-[#414755] opacity-60 hover:opacity-100 transition-all tap-highlight-none active:scale-90 duration-300"
                            >
                                <Icon name="plus-circle" className="w-6 h-6" />
                                <span className="font-['Inter'] text-[11px] font-medium tracking-wide uppercase mt-1">{t('ekle')}</span>
                            </button>
                            <button
                                onClick={() => setShowAllTxModal(true)}
                                className="flex flex-col items-center justify-center text-[#414755] opacity-60 hover:opacity-100 transition-all tap-highlight-none active:scale-90 duration-300"
                            >
                                <Icon name="list" className="w-6 h-6" />
                                <span className="font-['Inter'] text-[11px] font-medium tracking-wide uppercase mt-1">{t('tum_islemler')}</span>
                            </button>
                            <button
                                onClick={() => setShowReport(true)}
                                className="flex flex-col items-center justify-center text-[#414755] opacity-60 hover:opacity-100 transition-all tap-highlight-none active:scale-90 duration-300"
                            >
                                <Icon name="bar-chart-2" className="w-6 h-6" />
                                <span className="font-['Inter'] text-[11px] font-medium tracking-wide uppercase mt-1">{t('rapor')}</span>
                            </button>
                            <button
                                onClick={() => setShowSettings(true)}
                                className="flex flex-col items-center justify-center text-[#414755] opacity-60 hover:opacity-100 transition-all tap-highlight-none active:scale-90 duration-300"
                            >
                                <Icon name="settings" className="w-6 h-6" />
                                <span className="font-['Inter'] text-[11px] font-medium tracking-wide uppercase mt-1">{t('ayarlar')}</span>
                            </button>
                        </nav>
                    </main>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));

        function App() {
            const [session, setSession] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    setLoading(false);
                });

                const {
                    data: { subscription },
                } = supabase.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                });

                return () => subscription.unsubscribe();
            }, []);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-surface">
                        <Icon name="loader-2" className="animate-spin text-primary w-8 h-8" />
                    </div>
                );
            }

            if (!session) {
                return <Auth supabase={supabase} />;
            }

            return <Dashboard session={session} />;
        }

        root.render(<App />);
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => console.log('SW registered:', registration.scope))
                    .catch(error => console.log('SW registration failed:', error));
            });
        }
    </script>
</body>

</html>
