<!DOCTYPE html>
<html class="light" lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Finansal Odağım - Ethereal Ledger</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    
    <!-- React & ReactDOM (UMD) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX parsing -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "surface-bright": "#faf9fe",
              "on-secondary-container": "#00732a",
              "tertiary": "#894d00",
              "primary": "#0058bc",
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed": "#ffdcbf",
              "primary-container": "#0070eb",
              "outline": "#717786",
              "background": "#faf9fe",
              "on-surface-variant": "#414755",
              "surface-container-low": "#f4f3f8",
              "surface-container-high": "#e9e7ed",
              "on-primary": "#ffffff",
              "surface": "#faf9fe",
              "secondary": "#006e28",
              "secondary-container": "#6ffb85",
              "on-surface": "#1a1b1f",
              "outline-variant": "#c1c6d7",
              "error": "#ba1a1a",
            },
            "borderRadius": {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
            "fontFamily": {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            }
          }
        }
      }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; min-height: max(884px, 100dvh); }
        .glass-card { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .tap-highlight-none { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Supabase Settings
        const SUPABASE_URL = 'https://xzcimebxlsgjksqsawmt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6Y2ltZWJ4bHNnamtzcXNhd210Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDE2OTEsImV4cCI6MjA5MjExNzY5MX0.wYTdW0t6Ck2riOAaL45DrNWi5_rPZylMHqpaiy7aMEA';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Icon Helper for Lucide
        const Icon = ({ name, className = "" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: spanRef.current, attrs: { class: className } });
                }
            }, [name, className]);
            return <span ref={spanRef} style={{display: 'contents'}}></span>;
        };

        function Auth({ supabase }) {
            const [loading, setLoading] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isLogin, setIsLogin] = useState(true);

            const handleEmailAuth = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    if (isLogin) {
                        const { error } = await supabase.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                    } else {
                        const { error } = await supabase.auth.signUp({ email, password });
                        if (error) throw error;
                        alert('Kayıt başarılı! Lütfen giriş yapın (E-posta doğrulaması kapalıysa).');
                    }
                } catch (error) {
                    alert(error.error_description || error.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleGoogleAuth = async () => {
                try {
                    const { error } = await supabase.auth.signInWithOAuth({
                        provider: 'google',
                    });
                    if (error) throw error;
                } catch (error) {
                    alert(error.error_description || error.message);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-surface p-4">
                    <div className="bg-surface-container-lowest p-8 rounded-2xl shadow-lg w-full max-w-md space-y-6">
                        <div className="text-center">
                            <h1 className="text-3xl font-black text-primary mb-2">Finans</h1>
                            <p className="text-on-surface-variant font-medium">Finansal odağınıza hoş geldiniz.</p>
                        </div>
                        
                        <form onSubmit={handleEmailAuth} className="space-y-4">
                            <div>
                                <label className="block text-sm font-bold text-on-surface-variant mb-1">E-posta</label>
                                <input 
                                    type="email" 
                                    className="w-full bg-surface-container-low text-on-surface rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary outline-none" 
                                    placeholder="ornek@mail.com"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-on-surface-variant mb-1">Şifre</label>
                                <input 
                                    type="password" 
                                    className="w-full bg-surface-container-low text-on-surface rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary outline-none" 
                                    placeholder="******"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    required
                                />
                            </div>
                            <button 
                                type="submit" 
                                disabled={loading}
                                className="w-full bg-primary text-on-primary font-bold py-3 rounded-xl shadow-md hover:opacity-90 active:scale-[0.98] transition-all disabled:opacity-50"
                            >
                                {loading ? 'Bekleniyor...' : (isLogin ? 'Giriş Yap' : 'Kayıt Ol')}
                            </button>
                        </form>

                        <div className="relative">
                            <div className="absolute inset-0 flex items-center">
                                <div className="w-full border-t border-outline-variant"></div>
                            </div>
                            <div className="relative flex justify-center text-sm">
                                <span className="px-2 bg-surface-container-lowest text-on-surface-variant">Veya</span>
                            </div>
                        </div>

                        <button 
                            onClick={handleGoogleAuth}
                            className="w-full bg-surface-container-high text-on-surface font-bold py-3 rounded-xl hover:bg-surface-container-highest transition-colors flex items-center justify-center gap-2"
                        >
                            <svg className="w-5 h-5" viewBox="0 0 24 24">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                            Google ile Devam Et
                        </button>

                        <div className="text-center mt-4 text-sm font-medium text-on-surface-variant">
                            {isLogin ? "Hesabınız yok mu? " : "Zaten hesabınız var mı? "}
                            <button 
                                onClick={() => setIsLogin(!isLogin)} 
                                className="text-primary font-bold hover:underline"
                            >
                                {isLogin ? "Kayıt Ol" : "Giriş Yap"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function Dashboard({ session }) {
            const [transactions, setTransactions] = useState([]);
            const [bakiye, setBakiye] = useState(0);
            
            // Category State
            const [categories, setCategories] = useState([]);
            const [showCategoryManager, setShowCategoryManager] = useState(false);
            const [newCategoryName, setNewCategoryName] = useState("");

            // Form State
            const [tutar, setTutar] = useState("");
            const [aciklama, setAciklama] = useState("");
            const [isHarcama, setIsHarcama] = useState(true);
            const [tekrarli, setTekrarli] = useState(false);
            const [loading, setLoading] = useState(false);
            const [tarih, setTarih] = useState(new Date().toISOString().split('T')[0]);
            const [secilenKategori, setSecilenKategori] = useState("");

            useEffect(() => {
                lucide.createIcons();
                fetchTransactions();
                fetchCategories();
            }, []);

            const fetchCategories = async () => {
                const { data, error } = await supabase
                    .from('categories')
                    .select('*')
                    .eq('user_id', session.user.id)
                    .order('isim', { ascending: true });
                if (data) setCategories(data);
            };

            const fetchTransactions = async () => {
                try {
                    const { data, error } = await supabase
                        .from('transactions')
                        .select('*')
                        .eq('user_id', session.user.id)
                        .order('tarih', { ascending: false });

                    if (error) {
                        console.error("Veri çekme hatası:", error);
                        return;
                    }
                    
                    if (data) {
                        setTransactions(data);
                        hesaplaBakiye(data);
                    }
                } catch (err) {
                    console.error("Beklenmeyen hata:", err);
                }
            };

            const hesaplaBakiye = (data) => {
                const toplam = data.reduce((acc, curr) => {
                    const miktar = parseFloat(curr.miktar) || 0;
                    return curr.tip === 'gelir' ? acc + miktar : acc - miktar;
                }, 0);
                setBakiye(toplam);
            };

            const handleAddCategory = async () => {
                if (!newCategoryName.trim()) return;
                const { error } = await supabase
                    .from('categories')
                    .insert([{ isim: newCategoryName.trim(), user_id: session.user.id }]);
                if (!error) {
                    setNewCategoryName("");
                    fetchCategories();
                }
            };

            const handleDeleteCategory = async (id) => {
                if(window.confirm("Bu kategoriyi silmek istediğinizden emin misiniz?")) {
                    const { error } = await supabase
                        .from('categories')
                        .delete()
                        .eq('id', id);
                    if (!error) fetchCategories();
                }
            };

            const handleEkle = async () => {
                if (!tutar || isNaN(parseFloat(tutar)) || !aciklama || !tarih) {
                    alert("Lütfen geçerli bir tutar, açıklama ve tarih giriniz.");
                    return;
                }

                setLoading(true);
                const tip = isHarcama ? 'gider' : 'gelir';
                
                const dt = new Date(tarih);
                const now = new Date();
                dt.setHours(now.getHours(), now.getMinutes(), now.getSeconds());
                
                const newTransaction = {
                    miktar: parseFloat(tutar),
                    aciklama: aciklama,
                    tip: tip,
                    tekrarli: tekrarli,
                    tarih: dt.toISOString(),
                    kategori: secilenKategori,
                    user_id: session.user.id
                };

                const { error } = await supabase
                    .from('transactions')
                    .insert([newTransaction]);

                setLoading(false);

                if (error) {
                    console.error("Ekleme hatası:", error);
                    alert("İşlem eklenirken hata oluştu. Lütfen transactions tablosunun oluşturulduğundan emin olun.");
                } else {
                    setTutar("");
                    setAciklama("");
                    setTekrarli(false);
                    setSecilenKategori("");
                    fetchTransactions();
                }
            };

            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY' }).format(amount);
            };

            const formatedDateString = (isoString) => {
                const d = new Date(isoString);
                return d.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' });
            };

            return (
                <main>
                    {/* Category Manager Modal */}
                    {showCategoryManager && (
                        <div className="fixed inset-0 z-[100] bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-surface-container-lowest w-full max-w-sm rounded-2xl shadow-xl overflow-hidden flex flex-col max-h-[80vh]">
                                <div className="p-4 border-b border-outline-variant/30 flex justify-between items-center bg-surface-container-low">
                                    <h3 className="font-bold text-lg">Kategorileri Yönet</h3>
                                    <button onClick={() => setShowCategoryManager(false)} className="p-2 hover:bg-surface-container-high rounded-full transition-colors">
                                        <Icon name="x" className="w-5 h-5"/>
                                    </button>
                                </div>
                                <div className="p-4 border-b border-outline-variant/30 flex gap-2">
                                    <input 
                                        type="text" 
                                        placeholder="Yeni Kategori Adı" 
                                        value={newCategoryName}
                                        onChange={e => setNewCategoryName(e.target.value)}
                                        className="flex-1 bg-surface-container-low border-transparent focus:border-transparent focus:ring-0 rounded-xl px-4 py-2 outline-none"
                                    />
                                    <button onClick={handleAddCategory} className="bg-primary text-on-primary p-2 px-4 rounded-xl font-bold active:scale-95 transition-transform">
                                        Ekle
                                    </button>
                                </div>
                                <div className="overflow-y-auto p-4 flex-1">
                                    {categories.length === 0 ? (
                                        <div className="text-center text-sm text-on-surface-variant py-4">Henüz kategori eklenmemiş.</div>
                                    ) : (
                                        <div className="space-y-2">
                                            {categories.map(cat => (
                                                <div key={cat.id} className="flex justify-between items-center p-3 bg-surface-container-low rounded-xl">
                                                    <span className="font-medium">{cat.isim}</span>
                                                    <button onClick={() => handleDeleteCategory(cat.id)} className="text-error p-2 hover:bg-error/10 rounded-lg transition-colors">
                                                        <Icon name="trash-2" className="w-4 h-4"/>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Top Navigation */}
                    <header className="bg-[#faf9fe]/80 backdrop-blur-2xl w-full top-0 sticky z-50 flex justify-between items-end px-6 pt-12 pb-4">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden flex items-center justify-center">
                                <Icon name="user" className="text-on-surface-variant w-5 h-5"/>
                            </div>
                            <div className="flex flex-col">
                                <span className="text-xl font-black tracking-tighter text-primary leading-tight">Finans</span>
                                <span className="text-[10px] font-bold text-on-surface-variant opacity-80">{session.user.email}</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button className="text-slate-900 hover:opacity-70 transition-opacity active:scale-95 duration-200">
                                <Icon name="bell" className="w-6 h-6"/>
                            </button>
                            <button 
                                onClick={() => supabase.auth.signOut()} 
                                className="text-error hover:opacity-70 transition-opacity active:scale-95 duration-200 bg-error/10 p-2 rounded-full"
                                title="Çıkış Yap"
                            >
                                <Icon name="log-out" className="w-5 h-5"/>
                            </button>
                        </div>
                    </header>

                    <div className="px-6 pt-8 max-w-md mx-auto space-y-10 pb-24">
                        {/* Hero Balance Section */}
                        <section className="space-y-1">
                            <h1 className="text-3xl font-extrabold tracking-tight text-on-surface">Finansal Odağım</h1>
                            <div className="pt-4">
                                <div className="text-[3.5rem] font-black leading-none tracking-tight text-secondary">
                                    {formatCurrency(bakiye)}
                                </div>
                                <div className="text-on-surface-variant font-medium text-sm mt-2 flex items-center gap-1">
                                    Mevcut Net Bakiye
                                    <Icon name="info" className="w-3 h-3 ml-1" />
                                </div>
                            </div>
                        </section>

                        {/* Alert Card */}
                        <section>
                            <div className="bg-surface-container-lowest p-4 rounded-xl shadow-[0_8px_24px_rgba(26,27,31,0.04)] flex items-center gap-4 group active:scale-95 transition-transform duration-200 cursor-pointer">
                                <div className="w-10 h-10 rounded-full bg-tertiary-fixed flex items-center justify-center">
                                    <Icon name="alert-circle" className="text-tertiary w-5 h-5" />
                                </div>
                                <div className="flex-1">
                                    <div className="font-bold text-on-surface">Yaklaşan Ödeme: Kira</div>
                                    <div className="text-on-surface-variant text-sm">Yarın • ₺15.000,00</div>
                                </div>
                                <Icon name="chevron-right" className="text-outline-variant w-5 h-5"/>
                            </div>
                        </section>

                        {/* AI Insights Section */}
                        <section>
                            <div className="relative overflow-hidden bg-primary/5 rounded-2xl p-5 border border-primary/10">
                                <div className="flex gap-3 items-start">
                                    <div className="bg-primary text-on-primary p-2 rounded-lg">
                                        <Icon name="bot" className="w-5 h-5"/>
                                    </div>
                                    <p className="text-primary font-medium text-[15px] leading-relaxed">
                                        Bu ay dışarıda yeme harcamanız hedefin <span className="font-bold underline">%20 üzerinde.</span> Dikkatli olmanızı öneririm.
                                    </p>
                                </div>
                                <div className="absolute -right-4 -bottom-4 w-24 h-24 bg-primary/10 blur-3xl rounded-full"></div>
                            </div>
                        </section>

                        {/* Quick Transaction Form */}
                        <section className="space-y-4">
                            <h2 className="font-['Inter'] text-[11px] font-bold tracking-widest text-on-surface-variant uppercase pl-1">HIZLI İŞLEM EKLE</h2>
                            <div className="bg-surface-container-low rounded-2xl p-1 space-y-px">
                                
                                {/* Segmented Control */}
                                <div className="bg-surface-container-lowest p-4 rounded-t-xl">
                                    <div className="flex bg-surface-container-high p-1 rounded-full relative">
                                        <button 
                                            onClick={() => setIsHarcama(true)} 
                                            className={`flex-1 py-2 text-sm font-bold rounded-full transition-all z-10 ${isHarcama ? 'bg-primary text-on-primary shadow-sm' : 'text-on-surface-variant'}`}
                                        >
                                            Harcama
                                        </button>
                                        <button 
                                            onClick={() => setIsHarcama(false)} 
                                            className={`flex-1 py-2 text-sm font-bold rounded-full transition-all z-10 ${!isHarcama ? 'bg-primary text-on-primary shadow-sm' : 'text-on-surface-variant'}`}
                                        >
                                            Gelir
                                        </button>
                                    </div>
                                </div>

                                {/* Amount Row */}
                                <div className="bg-surface-container-lowest p-4 flex justify-between items-center bg-surface-container-lowest">
                                    <span className="text-on-surface-variant font-medium">Tutar (₺)</span>
                                    <input 
                                        type="number" 
                                        value={tutar} 
                                        onChange={(e) => setTutar(e.target.value)} 
                                        className="text-right font-bold text-xl text-primary bg-transparent border-none focus:ring-0 p-0 placeholder:text-outline-variant w-1/2" 
                                        placeholder="0.00" 
                                    />
                                </div>
                                
                                {/* Description Row */}
                                <div className="bg-surface-container-lowest p-4 flex justify-between items-center">
                                    <span className="text-on-surface-variant font-medium">Açıklama</span>
                                    <input 
                                        type="text" 
                                        value={aciklama} 
                                        onChange={(e) => setAciklama(e.target.value)} 
                                        className="text-right text-on-surface bg-transparent border-none focus:ring-0 p-0 placeholder:text-outline-variant w-1/2" 
                                        placeholder="örn: Kahve" 
                                    />
                                </div>

                                {/* Date Row */}
                                <div className="bg-surface-container-lowest p-4 flex justify-between items-center">
                                    <span className="text-on-surface-variant font-medium">Tarih</span>
                                    <input 
                                        type="date" 
                                        value={tarih} 
                                        onChange={(e) => setTarih(e.target.value)} 
                                        className="text-right text-on-surface bg-transparent border-none focus:ring-0 p-0 w-1/2" 
                                    />
                                </div>
                                
                                {/* Category Row */}
                                <div className="bg-surface-container-lowest p-4 flex justify-between items-center">
                                    <span className="text-on-surface-variant font-medium">Kategori</span>
                                    <select 
                                        value={secilenKategori} 
                                        onChange={(e) => {
                                            if (e.target.value === "manage") {
                                                setShowCategoryManager(true);
                                            } else {
                                                setSecilenKategori(e.target.value);
                                            }
                                        }}
                                        className="text-right text-on-surface bg-transparent border-none focus:ring-0 p-0 w-1/2 font-medium"
                                    >
                                        <option value="">Seçiniz</option>
                                        {categories.map((cat, index) => (
                                            <option key={`${cat.id}-${index}`} value={cat.isim}>{cat.isim}</option>
                                        ))}
                                        <option disabled>──────────</option>
                                        <option value="manage" className="font-bold">⚙ Yönet...</option>
                                    </select>
                                </div>
                                
                                {/* Switch Row */}
                                <div className="bg-surface-container-lowest p-4 rounded-b-xl flex justify-between items-center">
                                    <span className="text-on-surface-variant font-medium">Tekrarlı Ödeme</span>
                                    
                                    <button 
                                        type="button"
                                        onClick={() => setTekrarli(!tekrarli)}
                                        className={`w-12 h-6 rounded-full relative flex items-center px-1 transition-colors duration-300 ${tekrarli ? 'bg-secondary' : 'bg-surface-container-high'}`}
                                    >
                                        <div className={`w-4 h-4 bg-white rounded-full absolute shadow-sm transition-transform duration-300 ${tekrarli ? 'right-1' : 'left-1'}`}></div>
                                    </button>
                                </div>
                            </div>
                            
                            <button 
                                onClick={handleEkle} 
                                disabled={loading}
                                className="w-full bg-primary text-on-primary font-bold py-4 rounded-full shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all disabled:opacity-50 flex items-center justify-center gap-2"
                            >
                                {loading ? <Icon name="loader-2" className="animate-spin w-5 h-5"/> : <Icon name="plus" className="w-5 h-5"/>}
                                {loading ? "Ekleniyor..." : "Ekle"}
                            </button>
                        </section>

                        {/* Transactions List */}
                        <section className="space-y-4">
                            <div className="flex justify-between items-center">
                                <h2 className="text-xl font-bold tracking-tight">Son İşlemler</h2>
                                <Icon name="chevron-down" className="text-on-surface-variant w-5 h-5"/>
                            </div>
                            <div className="bg-surface-container-low rounded-2xl overflow-hidden space-y-px">
                                {transactions.length === 0 ? (
                                    <div className="bg-surface-container-lowest p-8 text-center text-on-surface-variant text-sm">
                                        Henüz bir işlem bulunmuyor.
                                    </div>
                                ) : (
                                    transactions.map(item => (
                                        <div key={item.id} className="bg-surface-container-lowest p-4 flex items-center gap-4">
                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center ${item.tip === 'gelir' ? 'bg-secondary-container' : 'bg-surface-container-high'}`}>
                                                {item.tip === 'gelir' 
                                                    ? <Icon name="arrow-down-to-line" className="text-on-secondary-container w-5 h-5"/> 
                                                    : <Icon name="shopping-bag" className="text-on-surface-variant w-5 h-5"/>
                                                }
                                            </div>
                                            <div className="flex-1">
                                                <div className="font-bold text-sm flex items-center flex-wrap gap-x-2 gap-y-1">
                                                    {item.aciklama}
                                                    {item.kategori && <span className="text-[10px] px-2 py-0.5 bg-outline-variant/30 text-on-surface-variant rounded-full font-medium whitespace-nowrap">{item.kategori}</span>}
                                                    {item.tekrarli && <Icon name="repeat" className="inline w-3 h-3 text-primary"/>}
                                                </div>
                                                <div className="text-xs text-outline font-medium">{formatedDateString(item.tarih)}</div>
                                            </div>
                                            <div className={`font-bold ${item.tip === 'gelir' ? 'text-secondary' : 'text-error'}`}>
                                                {item.tip === 'gelir' ? '+' : '-'} {formatCurrency(item.miktar)}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </section>
                    </div>

                    {/* BottomNavBar */}
                    <nav className="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pt-3 pb-8 bg-[#faf9fe]/80 backdrop-blur-2xl z-50 rounded-t-3xl shadow-[0_-8px_24px_rgba(26,27,31,0.04)]">
                        <a className="flex flex-col items-center justify-center text-primary scale-110 transition-transform tap-highlight-none active:scale-90 duration-300" href="#">
                            <Icon name="wallet" className="w-6 h-6"/>
                            <span className="font-['Inter'] text-[11px] font-medium tracking-wide uppercase mt-1">Overview</span>
                        </a>
                        <a className="flex flex-col items-center justify-center text-[#414755] opacity-60 hover:opacity-100 transition-all tap-highlight-none active:scale-90 duration-300" href="#">
                            <Icon name="credit-card" className="w-6 h-6"/>
                            <span className="font-['Inter'] text-[11px] font-medium tracking-wide uppercase mt-1">Accounts</span>
                        </a>
                        <a className="flex flex-col items-center justify-center text-[#414755] opacity-60 hover:opacity-100 transition-all tap-highlight-none active:scale-90 duration-300" href="#">
                            <Icon name="bar-chart-2" className="w-6 h-6"/>
                            <span className="font-['Inter'] text-[11px] font-medium tracking-wide uppercase mt-1">Insights</span>
                        </a>
                        <a className="flex flex-col items-center justify-center text-[#414755] opacity-60 hover:opacity-100 transition-all tap-highlight-none active:scale-90 duration-300" href="#">
                            <Icon name="settings" className="w-6 h-6"/>
                            <span className="font-['Inter'] text-[11px] font-medium tracking-wide uppercase mt-1">Settings</span>
                        </a>
                    </nav>
                </main>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));

        function App() {
            const [session, setSession] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    setLoading(false);
                });

                const {
                    data: { subscription },
                } = supabase.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                });

                return () => subscription.unsubscribe();
            }, []);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-surface">
                        <Icon name="loader-2" className="animate-spin text-primary w-8 h-8"/>
                    </div>
                );
            }

            if (!session) {
                return <Auth supabase={supabase} />;
            }

            return <Dashboard session={session} />;
        }

        root.render(<App />);
    </script>
</body>
</html>
